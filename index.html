<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Prachi Chauhan | Business Analyst & Web Developer Portfolio</title>
  
  <!-- GSAP Core for smooth spring transforms & animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <!-- Lenis for smooth scrolling -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts for Pixel Art Recreation -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind Config Customizations -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pixel: ['"Pixelify Sans"', 'system-ui', 'sans-serif'],
            mono: ['"Pixelify Sans"', 'monospace'],
          },
          colors: {
            pixelBlue: '#d6e4ff',
            pixelPink: '#ffc6e5',
            pixelDarkBlue: '#003087',
            pixelBg: '#f0f4ff',
            
            // Goals/Team colors
            'game-blue': '#e0f2fe',
            'game-pink': '#fbcfe8',
            'game-purple': '#a855f7',
            'game-border': '#1e293b',
          }
        }
      }
    }
  </script>

  <style>
    /* Global Viewport Reset and Typography Override */
    html, body, #root {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      min-height: 100% !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
    }

    * {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .pixeloid-font {
      font-family: 'Pixeloid Sans', sans-serif !important;
    }

    /* Styling constraints: Flat retro game design */
    .pixel-border {
      border: 4px solid #003087;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
    }
    
    .pixel-window-header {
      background: white;
      border-bottom: 2px solid #003087;
      height: 12px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      gap: 4px;
    }
    
    .dot { width: 4px; height: 4px; background: #003087; }
    
    .heading-large { 
      font-size: 1.75rem; 
      line-height: 2.25rem; 
      font-weight: 800; 
      letter-spacing: -0.02em; 
      color: #003087;
    }
    
    /* Clean typography overrides for descriptions */
    .text-tiny {
      font-size: 0.875rem !important; /* 14px */
      line-height: 1.25rem !important;
      font-weight: 500 !important;
      color: #475569;
    }

    .pixel-text-small {
      font-size: 0.875rem !important; /* 14px */
      line-height: 1.25rem !important;
      font-weight: 500 !important;
      color: #475569;
    }

    /* Custom CSS Animations */
    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(10deg); }
    }
    .sway-animation {
      animation: sway 2.5s ease-in-out infinite;
      transform-origin: bottom center;
      display: inline-block;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 12px 2px rgba(253, 224, 71, 0.4); transform: scale(1) translateX(-50%); }
      50% { box-shadow: 0 0 24px 10px rgba(253, 224, 71, 0.7); transform: scale(1.05) translateX(-50%); }
    }
    .sun-pulse {
      animation: pulse-glow 3.5s ease-in-out infinite;
      transform-origin: left top;
    }

    @keyframes cursor-float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(5px, 5px); }
    }
    .cursor-animate {
      animation: cursor-float 1.4s ease-in-out infinite;
    }

    @keyframes steps-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .feet-character {
      animation: steps-bounce 0.8s ease-in-out infinite;
    }

    @keyframes flow-pulse {
      0%, 100% { border-color: #003087; background-color: white; }
      50% { border-color: #ffc6e5; background-color: #f0f4ff; }
    }
    .flow-card-pulse {
      animation: flow-pulse 2s infinite;
    }

    @keyframes particle-fade-up {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-35px) scale(0.8); }
    }
    .particle {
      animation: particle-fade-up 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20%, 60% { transform: rotate(-8deg); }
      40%, 80% { transform: rotate(8deg); }
    }
    .shake-animation {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes float-item {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float-item-animation {
      animation: float-item 1.5s ease-in-out infinite;
    }

    /* 3D Flip Card Configuration */
    .card-flip-container {
      perspective: 800px;
    }
    .card-flip-inner {
      transition: transform 0.5s;
      transform-style: preserve-3d;
      position: relative;
      height: 260px;
    }
    .card-flip-inner.is-flipped {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      position: absolute;
      inset: 0;
    }
    .card-back {
      transform: rotateY(180deg);
    }

    /* Premium Clean Entrances for Recruiters */
    @keyframes spring-up {
      0% { 
        opacity: 0; 
        transform: translateY(12px) scale(0.99); 
        filter: blur(4px); 
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
        filter: blur(0); 
      }
    }
    .entrance-card {
      animation: spring-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 50ms; }
    .stagger-3 { animation-delay: 100ms; }
    .stagger-4 { animation-delay: 150ms; }
    .stagger-5 { animation-delay: 200ms; }
    .stagger-6 { animation-delay: 250ms; }

    /* 3D Tilt Card and Parallax styling */
    .tilt-card {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform, box-shadow;
    }
    .tilt-card-inner {
      transform: translateZ(20px);
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    /* Subtle background ambient overlay styling */
    .premium-bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(59, 130, 246, 0.035) 0%, transparent 60%);
      transition: background 0.15s ease;
    }
    
    /* Light sweep overlay to reflect cursor hover direction */
    .light-sweep {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.5s ease;
      border-radius: inherit;
    }
    .tilt-card:hover .light-sweep {
      opacity: 1;
    }
    
    /* Cursor follower glow element */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 48, 135, 0.03) 0%, rgba(0, 48, 135, 0) 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      will-change: transform;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .cursor-glow.active {
      opacity: 1;
    }

    /* Premium 3D perspective space transitions */
    .workspace-fade {
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity, transform, filter;
    }
    .workspace-fade-hidden {
      opacity: 0;
      transform: perspective(1500px) translateZ(-40px) translateY(12px) rotateX(2deg);
      filter: blur(4px);
    }
    .workspace-fade-visible {
      opacity: 1;
      transform: perspective(1500px) translateZ(0px) translateY(0px) rotateX(0deg);
      filter: blur(0);
    }

    /* 3D Hinged Drop for Navigation Bar */
    @keyframes navbar-drop-3d {
      0% {
        opacity: 0;
        transform: translateY(-85px) rotateX(-35deg) scale(0.95);
        filter: blur(10px);
      }
      60% {
        transform: translateY(5px) rotateX(4deg) scale(1.01);
        filter: blur(2px);
      }
      85% {
        transform: translateY(-2px) rotateX(-1deg) scale(0.998);
      }
      100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg) scale(1);
        filter: blur(0);
      }
    }
    .navbar-3d-entrance {
      animation: navbar-drop-3d 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      transform-origin: top center;
      opacity: 0;
    }

    /* CRT Television collapse and turn-on animations */
    @keyframes crt-off {
      0% { transform: scale(1, 1); filter: brightness(1) contrast(1); }
      40% { transform: scale(1, 0.02); filter: brightness(3) contrast(1.5); }
      100% { transform: scale(0, 0); filter: brightness(10) contrast(2); }
    }
    @keyframes crt-on {
      0% { transform: scale(0, 0); filter: brightness(10) contrast(2); }
      50% { transform: scale(1, 0.02); filter: brightness(3) contrast(1.5); }
      100% { transform: scale(1, 1); filter: brightness(1) contrast(1); }
    }
    .crt-screen-off {
      animation: crt-off 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      transform-origin: center center;
    }
    .crt-screen-on {
      animation: crt-on 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      transform-origin: center center;
    }

    @keyframes ground-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-groundLoop {
      animation: ground-scroll 0.8s linear infinite;
    }

    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 8s linear infinite;
    }

    @keyframes npc-idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .animate-npcIdle {
      animation: npc-idle 3s ease-in-out infinite;
    }

    @keyframes bird-fly {
      0% { transform: translateX(-15vw) translateY(0) scaleX(1); }
      48% { transform: translateX(110vw) translateY(-15px) scaleX(1); }
      50% { transform: translateX(110vw) translateY(-15px) scaleX(-1); }
      98% { transform: translateX(-15vw) translateY(0) scaleX(-1); }
      100% { transform: translateX(-15vw) translateY(0) scaleX(1); }
    }
    .animate-birdFly {
      animation: bird-fly 30s linear infinite;
    }

<body class="min-h-screen flex flex-col transition-colors duration-500 selection:bg-pixelPink selection:text-pixelDarkBlue">
  <div id="root" class="flex flex-col min-h-screen w-full"></div>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BOOT_MESSAGES = [
      "INITIALIZING PORTFOLIO KERNEL...",
      "LOADING COGNITIVE PROFILE: PRACHI CHAUHAN...",
      "SYNCHRONIZING MERN FRAMEWORKS & SQL CORE...",
      "DECRYPTING BUSINESS ANALYSIS METRICS...",
      "COMPILING WORKSPACE. READY PLAYER ONE!"
    ];

    const SHUTDOWN_MESSAGES = [
      "SAVING ANALYTICAL WORKSPACES...",
      "DISCONNECTING SYSTEM LEASE...",
      "CLEANING DB METRIC BUFFERS...",
      "SHUTDOWN SEQUENCE COMPLETED. GOODBYE!"
    ];

    // Retro terminal booting screen component
    function BootScreen({ onComplete, isShuttingDown = false }) {
      const [progress, setProgress] = useState(0);
      const [logs, setLogs] = useState([]);
      const [exitClass, setExitClass] = useState('crt-screen-on'); // Power on collapse
      const messages = isShuttingDown ? SHUTDOWN_MESSAGES : BOOT_MESSAGES;

      useEffect(() => {
        if (progress >= 100) {
          const exitTimeout = setTimeout(() => {
            setExitClass('crt-screen-off'); // Trigger vertical shut down line
            const completeTimeout = setTimeout(() => {
              onComplete();
            }, 120);
            return () => clearTimeout(completeTimeout);
          }, 100);
          return () => clearTimeout(exitTimeout);
        }

        const timer = setTimeout(() => {
          setProgress(prev => Math.min(prev + 20, 100)); // Step by 20%
        }, 20); // 20ms interval

        return () => clearTimeout(timer);
      }, [progress, onComplete]);

      useEffect(() => {
        const index = Math.min(
          Math.floor((progress / 100) * messages.length),
          messages.length - 1
        );
        const currentMessage = messages[index];
        setLogs(prev => {
          if (prev.length === 0 || prev[prev.length - 1] !== currentMessage) {
            return [...prev, currentMessage];
          }
          return prev;
        });
      }, [progress, messages]);

      return (
        <div className={`w-full max-w-2xl bg-black rounded-lg border-4 border-slate-700 p-6 font-mono text-xs sm:text-sm text-green-400 relative overflow-hidden h-[320px] flex flex-col justify-between scanlines shadow-2xl mx-auto my-12 ${exitClass}`}>
          <div className="flex justify-between border-b border-green-900 pb-2 select-none font-bold">
            <span>PRACHI_CONSOL_MODULE v2.7</span>
            <span className="animate-pulse">● ONLINE</span>
          </div>

          <div className="flex-grow my-4 space-y-1.5 overflow-y-auto font-medium">
            {logs.map((log, idx) => (
              <div key={idx} className="flex items-center gap-2">
                <span>&gt;</span>
                <span>{log}</span>
              </div>
            ))}
            <div className="flex items-center gap-1">
              <span>&gt;</span>
              <span className="w-2.5 h-4 bg-green-400 cursor-blink"></span>
            </div>
          </div>

          <div className="space-y-2 select-none">
            <div className="flex justify-between text-xs tracking-wider font-bold">
              <span>
                {isShuttingDown ? "SHUTTING DOWN SYSTEM..." : "BOOTING OS INTERACTION..."}
              </span>
              <span>{progress}%</span>
            </div>
            <div className="w-full bg-green-950 h-5 border border-green-800 p-0.5">
              <div 
                className="h-full bg-green-400 transition-all duration-75"
                style={{ width: `${progress}%` }}
              />
            </div>
          </div>
        </div>
      );
    }

    function JumperGame() {
      const [isPlaying, setIsPlaying] = useState(false);
      const [gameOver, setGameOver] = useState(false);
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);
      const [playerY, setPlayerY] = useState(0); // Height above ground in px
      const [isJumping, setIsJumping] = useState(false);
      const [obstacleX, setObstacleX] = useState(100); // Percentage from left
      const [obstacleType, setObstacleType] = useState('BUG');
      const [speed, setSpeed] = useState(2.2);

      const obstacleTypes = ['BUG', 'ERR', 'CRASH', '404', 'CONFLICT'];

      // Jump trigger
      const jump = () => {
        if (gameOver) {
          resetGame();
          return;
        }
        if (!isPlaying) {
          setIsPlaying(true);
          return;
        }
        if (isJumping) return;
        
        setIsJumping(true);
        playJumpSound();
        
        // Jump animation physics
        let height = 0;
        let up = true;
        const jumpInterval = setInterval(() => {
          if (up) {
            height += 8;
            if (height >= 80) {
              up = false;
            }
          } else {
            height -= 8;
            if (height <= 0) {
              height = 0;
              clearInterval(jumpInterval);
              setIsJumping(false);
            }
          }
          setPlayerY(height);
        }, 20);
      };

      const playJumpSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}
      };

      const playCrashSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(120, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(40, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      };

      const resetGame = () => {
        setScore(0);
        setObstacleX(100);
        setPlayerY(0);
        setIsJumping(false);
        setGameOver(false);
        setIsPlaying(true);
        setSpeed(2.2);
      };

      // Game Loop
      useEffect(() => {
        if (!isPlaying || gameOver) return;

        const gameLoop = setInterval(() => {
          setObstacleX(prev => {
            let next = prev - speed;
            
            // Check collision
            if (next > 18 && next < 30) {
              if (playerY < 42) {
                setGameOver(true);
                playCrashSound();
                setIsPlaying(false);
                return prev;
              }
            }

            // Reset obstacle and increment score when passed
            if (next <= 0) {
              setScore(s => {
                const nextScore = s + 1;
                if (nextScore > highScore) setHighScore(nextScore);
                setSpeed(sp => Math.min(sp + 0.15, 5));
                return nextScore;
              });
              setObstacleType(obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)]);
              return 100;
            }
            return next;
          });
        }, 25);

        return () => clearInterval(gameLoop);
      }, [isPlaying, gameOver, playerY, speed, highScore]);

      // Keyboard controls listener
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space') {
            e.preventDefault();
            jump();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);

        if (!gamePlaying) {

          setGamePlaying(true);
          setGameOver(false);
          setGameScore(0);
          setObstacleX(100);
          return;
        }
        if (gameOver) {

          setGameOver(false);
          setGameScore(0);
          setObstacleX(100);
          return;
        }
        if (isJumping) return;
        setIsJumping(true);
        // Play jump sound
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);

          lastTime = time;

          setObstacleX(prev => {
            let nextX = prev - 0.085 * delta; // speed factor
            if (nextX <= -5) {
              // Obstacle cleared!
              setGameScore(s => {
                const nextScore = s + 10;
                if (nextScore > highScore) {
                  setHighScore(nextScore);

              // Select random next obstacle type

            // Collision check!
            if (nextX > 14 && nextX < 26) {

                  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                  osc.connect(gain);
                  gain.connect(ctx.destination);
                  osc.start();
                  osc.stop(ctx.currentTime + 0.3);
                } catch (e) {}
              }
            }

            return nextX;
          });

          if (!gameOver) {
            animationFrameId = requestAnimationFrame(updateGame);

      // Mouse move interactions: 3D tilt, magnetic cursor, background light gradient, cursor glow
      useEffect(() => {
        const isReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (isReducedMotion) return;

        const cursorGlow = document.querySelector('.cursor-glow');
        const bgOverlay = document.querySelector('.premium-bg-overlay');

        const handleMouseMove = (e) => {
          const mx = e.clientX;
          const my = e.clientY;

          // 1. Move custom cursor glow with slight lag
          if (cursorGlow) {
            cursorGlow.classList.add('active');
            gsap.to(cursorGlow, {
              x: mx,
              y: my,
              duration: 0.3,
              ease: 'power2.out',
              overwrite: 'auto'
            });
          }

          // 2. Dynamic background gradient follow
          if (bgOverlay) {
            const rx = (mx / window.innerWidth) * 100;
            const ry = (my / window.innerHeight) * 100;
            bgOverlay.style.setProperty('--mouse-x', `${rx}%`);
            bgOverlay.style.setProperty('--mouse-y', `${ry}%`);
          }

          // 3. 3D Card Tilting calculation
          const tiltCards = document.querySelectorAll('.tilt-card');
          tiltCards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const cx = mx - rect.left;
            const cy = my - rect.top;

            if (cx >= 0 && cy >= 0 && cx <= rect.width && cy <= rect.height) {
              const nx = cx / rect.width - 0.5;
              const ny = cy / rect.height - 0.5;
              
              // Rotate X based on Y offset, Rotate Y based on X offset (limit: max 2.5 deg)
              const rxVal = -ny * 5;
              const ryVal = nx * 5;
              
              card.style.transform = `perspective(1500px) rotateX(${rxVal}deg) rotateY(${ryVal}deg) translateY(-4px)`;
              
              // Dynamic shadow calculation
              const sx = -nx * 8;
              const sy = 8 - ny * 6;
              card.style.boxShadow = `${sx}px ${sy}px 18px rgba(0, 48, 135, 0.06), 2px 2px 0px rgba(0,0,0,0.05)`;

              // Radial sweep spotlight
              const sweep = card.querySelector('.light-sweep');
              if (sweep) {
                const px = (cx / rect.width) * 100;
                const py = (cy / rect.height) * 100;
                sweep.style.background = `radial-gradient(circle 120px at ${px}% ${py}%, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.02) 60%, transparent 100%)`;
              }
            } else {
              // Return card to normal
              card.style.transform = '';
              card.style.boxShadow = '';
              const sweep = card.querySelector('.light-sweep');
              if (sweep) sweep.style.background = '';
            }
          });

          // 4. Magnetic Proximity pull (attraction limit: 3px, range: 60px)
          const magneticItems = document.querySelectorAll('.pixel-btn, .workspace-tab');
          magneticItems.forEach(item => {
            const rect = item.getBoundingClientRect();
            const ix = rect.left + rect.width / 2;
            const iy = rect.top + rect.height / 2;
            const dx = mx - ix;
            const dy = my - iy;
            const dist = Math.hypot(dx, dy);

            if (dist < 60) {
              const px = (dx / 60) * 3;
              const py = (dy / 60) * 3;
              gsap.to(item, {
                x: px,
                y: py,
                duration: 0.4,
                ease: 'power2.out',

                y: 0,
                duration: 0.5,
                ease: 'elastic.out(1, 0.5)',
                overwrite: 'auto'
              });
            }
          });
        };

        const handleMouseLeave = () => {
          if (cursorGlow) cursorGlow.classList.remove('active');
          const tiltCards = document.querySelectorAll('.tilt-card');
          tiltCards.forEach(card => {
            card.style.transform = '';

          });

        window.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseleave', handleMouseLeave);
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);

          });

        }

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('reveal-active');
              observer.unobserve(entry.target);
            }

        // Query all elements with entrance-card or scroll-reveal classes

          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          
          // Classic 4-note rising retro arpeggio chord (C4 -> E4 -> G4 -> C5)
          const notes = [261.63, 329.63, 392.00, 523.25];
          const noteDuration = 0.09; // 90ms duration

          notes.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'square'; // NES/Gameboy retro sound wave shape
            osc.frequency.value = freq;

            const startTime = ctx.currentTime + index * noteDuration;
            
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.12, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration - 0.01);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(startTime);
            osc.stop(startTime + noteDuration);
          });
        } catch (e) {
          console.warn("Audio Context blocked or not supported:", e);
        }
      };

                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Footer Actions */}
                  <div className="flex flex-col sm:flex-row gap-3 justify-end pt-4 border-t border-slate-100">
                    <button 
                      onClick={() => setSelectedProject(null)}
                      className="border-2 border-black px-6 py-2.5 text-xs font-extrabold text-black bg-white hover:bg-slate-50 transition-colors order-2 sm:order-1 cursor-pointer"
                    >
                      CLOSE WINDOW
                    </button>
                    <a 
                      href={selectedProject.githubUrl} 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="pixel-btn px-5 py-2 text-xs font-extrabold text-white text-center hover:brightness-110 transition-all flex items-center justify-center gap-1.5 order-1 sm:order-2"
                    >
                      <span>🌐</span>
                      <span>GITHUB REPOSITORY</span>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
