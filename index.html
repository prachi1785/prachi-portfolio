  <style>
    /* Global Viewport Reset and Typography Override */

    .pixel-window-header {

    /* Custom CSS Animations */

    /* Premium Modern Spring Entrances for Recruiters */
    @keyframes spring-up {

    /* Fluid cross-dissolve transitions */

    /* CRT Television collapse and turn-on animations */
    @keyframes crt-off {
      0% { transform: scale(1, 1); filter: brightness(1) contrast(1); }
      40% { transform: scale(1, 0.02); filter: brightness(3) contrast(1.5); }

    .crt-screen-off {

    .hero-title {

    .ground-layer {

    .pixel-btn {

    .speech-bubble {

    .speech-bubble::after {

    .speech-bubble::before {
      content: '';

    /* Terminal CRT scanline screen overlay effect */

    .cursor-blink {

    /* Goals / Team layout configurations */

    .pixel-grid {

<body class="min-h-screen flex flex-col transition-colors duration-500 selection:bg-pixelPink selection:text-pixelDarkBlue">
  <div id="root" class="flex flex-col min-h-screen w-full"></div>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BOOT_MESSAGES = [
      "INITIALIZING PORTFOLIO KERNEL...",
      "LOADING COGNITIVE PROFILE: PRACHI CHAUHAN...",
      "SYNCHRONIZING MERN FRAMEWORKS & SQL CORE...",
      "DECRYPTING BUSINESS ANALYSIS METRICS...",
      "COMPILING WORKSPACE. READY PLAYER ONE!"
    ];

    const SHUTDOWN_MESSAGES = [
      "SAVING ANALYTICAL WORKSPACES...",
      "DISCONNECTING SYSTEM LEASE...",
      "CLEANING DB METRIC BUFFERS...",
      "SHUTDOWN SEQUENCE COMPLETED. GOODBYE!"
    ];

    // Retro terminal booting screen component
    function BootScreen({ onComplete, isShuttingDown = false }) {
      const [progress, setProgress] = useState(0);
      const [logs, setLogs] = useState([]);
      const [exitClass, setExitClass] = useState('crt-screen-on'); // Power on collapse
      const messages = isShuttingDown ? SHUTDOWN_MESSAGES : BOOT_MESSAGES;

      useEffect(() => {
        if (progress >= 100) {
          const exitTimeout = setTimeout(() => {
            setExitClass('crt-screen-off'); // Trigger vertical shut down line
            const completeTimeout = setTimeout(() => {
              onComplete();
            }, 120);
            return () => clearTimeout(completeTimeout);
          }, 100);
          return () => clearTimeout(exitTimeout);
        }

        const timer = setTimeout(() => {
          setProgress(prev => Math.min(prev + 20, 100)); // Step by 20%
        }, 20); // 20ms interval

        return () => clearTimeout(timer);
      }, [progress, onComplete]);

      useEffect(() => {
        const index = Math.min(
          Math.floor((progress / 100) * messages.length),
          messages.length - 1
        );
        const currentMessage = messages[index];
        setLogs(prev => {
          if (prev.length === 0 || prev[prev.length - 1] !== currentMessage) {
            return [...prev, currentMessage];
          }
          return prev;
        });
      }, [progress, messages]);

      return (
        <div className={`w-full max-w-2xl bg-black rounded-lg border-4 border-slate-700 p-6 font-mono text-xs sm:text-sm text-green-400 relative overflow-hidden h-[320px] flex flex-col justify-between scanlines shadow-2xl mx-auto my-12 ${exitClass}`}>
          <div className="flex justify-between border-b border-green-900 pb-2 select-none font-bold">
            <span>PRACHI_CONSOL_MODULE v2.7</span>
            <span className="animate-pulse">● ONLINE</span>
          </div>

          <div className="flex-grow my-4 space-y-1.5 overflow-y-auto font-medium">
            {logs.map((log, idx) => (
              <div key={idx} className="flex items-center gap-2">
                <span>&gt;</span>
                <span>{log}</span>
              </div>
            ))}
            <div className="flex items-center gap-1">
              <span>&gt;</span>
              <span className="w-2.5 h-4 bg-green-400 cursor-blink"></span>
            </div>
          </div>

          <div className="space-y-2 select-none">
            <div className="flex justify-between text-xs tracking-wider font-bold">
              <span>
                {isShuttingDown ? "SHUTTING DOWN SYSTEM..." : "BOOTING OS INTERACTION..."}
              </span>
              <span>{progress}%</span>
            </div>
            <div className="w-full bg-green-950 h-5 border border-green-800 p-0.5">
              <div 
                className="h-full bg-green-400 transition-all duration-75"
                style={{ width: `${progress}%` }}
              />
            </div>
          </div>
        </div>
      );
    }

    function JumperGame() {
      const [isPlaying, setIsPlaying] = useState(false);
      const [gameOver, setGameOver] = useState(false);
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(0);
      const [playerY, setPlayerY] = useState(0); // Height above ground in px
      const [isJumping, setIsJumping] = useState(false);
      const [obstacleX, setObstacleX] = useState(100); // Percentage from left
      const [obstacleType, setObstacleType] = useState('BUG');
      const [speed, setSpeed] = useState(2.2);

      const obstacleTypes = ['BUG', 'ERR', 'CRASH', '404', 'CONFLICT'];

      // Jump trigger
      const jump = () => {
        if (gameOver) {
          resetGame();
          return;
        }
        if (!isPlaying) {
          setIsPlaying(true);
          return;
        }
        if (isJumping) return;
        
        setIsJumping(true);
        playJumpSound();
        
        // Jump animation physics
        let height = 0;
        let up = true;
        const jumpInterval = setInterval(() => {
          if (up) {
            height += 8;
            if (height >= 80) {
              up = false;
            }
          } else {
            height -= 8;
            if (height <= 0) {
              height = 0;
              clearInterval(jumpInterval);
              setIsJumping(false);
            }
          }
          setPlayerY(height);
        }, 20);
      };

      const playJumpSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}
      };

      const playCrashSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(120, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(40, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      };

      const resetGame = () => {
        setScore(0);
        setObstacleX(100);
        setPlayerY(0);
        setIsJumping(false);
        setGameOver(false);
        setIsPlaying(true);
        setSpeed(2.2);
      };

      // Game Loop
      useEffect(() => {
        if (!isPlaying || gameOver) return;

        const gameLoop = setInterval(() => {
          setObstacleX(prev => {
            let next = prev - speed;
            
            // Check collision
            if (next > 18 && next < 30) {
              if (playerY < 42) {
                setGameOver(true);
                playCrashSound();
                setIsPlaying(false);
                return prev;
              }
            }

            // Reset obstacle and increment score when passed
            if (next <= 0) {
              setScore(s => {
                const nextScore = s + 1;
                if (nextScore > highScore) setHighScore(nextScore);
                setSpeed(sp => Math.min(sp + 0.15, 5));
                return nextScore;
              });
              setObstacleType(obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)]);
              return 100;
            }
            return next;
          });
        }, 25);

        return () => clearInterval(gameLoop);
      }, [isPlaying, gameOver, playerY, speed, highScore]);

      // Keyboard controls listener
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.code === 'Space') {
            e.preventDefault();
            jump();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isPlaying, gameOver, isJumping, playerY]);

      return (
        <div 
          onClick={jump}
          className="bg-slate-900 border-4 border-pixelDarkBlue p-4 relative overflow-hidden h-[180px] w-full flex flex-col justify-between cursor-pointer select-none text-white font-mono rounded animate-fadeIn"
        >
          <div className="flex justify-between items-center text-[10px] sm:text-xs z-10 font-bold">
            <span className="text-yellow-400">👾 BUG RUNNER v1.0 (Mini-Game)</span>
            <div className="flex gap-4">
              <span>SCORE: <span className="text-green-400">{score}</span></span>
              <span>HIGH: <span className="text-pink-400">{highScore}</span></span>
            </div>
          </div>

          <div className="flex-grow relative border border-slate-700/50 my-2 overflow-hidden bg-slate-950 flex items-end">
            <div className="absolute bottom-0 left-0 right-0 h-4 bg-slate-800 border-t border-slate-600 flex items-center justify-around overflow-hidden">
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
              <div className="h-full w-px bg-slate-600"></div>
            </div>

            <div 
              className="absolute left-[20%] w-6 h-6 bg-blue-500 border border-white flex flex-col justify-center items-center"
              style={{ bottom: `${playerY + 16}px` }}
            >
              <div className="flex justify-around w-full px-0.5">
                <span className="w-1 h-1 bg-white"></span>
                <span className="w-1 h-1 bg-white"></span>
              </div>
              <span className="text-[7px] font-bold mt-0.5">DEV</span>
            </div>

            {isPlaying && (
              <div 
                className="absolute w-12 h-6 bg-red-600 border border-white flex items-center justify-center text-[8px] font-extrabold text-white"
                style={{ left: `${obstacleX}%`, bottom: '16px' }}
              >
                {obstacleType}
              </div>
            )}

            {!isPlaying && (
              <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-center p-2 z-20">
                {gameOver ? (
                  <>
                    <span className="text-red-500 font-extrabold text-xs sm:text-sm animate-pulse mb-1">GAME OVER</span>
                    <span className="text-[9px] text-gray-400">CRASHED INTO {obstacleType}! SCORE: {score}</span>
                    <span className="text-[8px] text-yellow-400 mt-2">CLICK SCREEN TO RESTART</span>
                  </>
                ) : (
                  <>
                    <span className="text-sky-400 font-extrabold text-xs sm:text-sm mb-1">BUG JUMPER Mini-Game</span>
                    <span className="text-[9px] text-gray-300">Jump over bugs & deploy successfully!</span>
                    <span className="text-[8px] text-yellow-400 mt-2">CLICK SCREEN OR PRESS SPACE TO START</span>
                  </>
                )}
              </div>
            )}
          </div>

          <div className="text-[8px] text-gray-500 text-center z-10">
            Controls: Click screen or press SPACEBAR to jump
          </div>
        </div>
      );
    }

    function ProjectFolder({ id, title, badge, onClick }) {
      return (
        <div 
          onClick={onClick}

          const notes = [261.63, 329.63, 392.00, 523.25];
          const noteDuration = 0.09; // 90ms duration

          notes.forEach((freq, index) => {

            osc.frequency.value = freq;

            const startTime = ctx.currentTime + index * noteDuration;

            gain.gain.linearRampToValueAtTime(0.12, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration - 0.01);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(startTime);
            osc.stop(startTime + noteDuration);
          });
